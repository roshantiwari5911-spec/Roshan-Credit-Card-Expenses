<script>
        const SUPABASE_URL = "https://tcxmvximermofhnbvvtg.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjeG12eGltZXJtb2ZobmJ2dnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjU4MzQsImV4cCI6MjA5Njk0MTgzNH0.YfgxM4CyAoByA3QGJaBqxK6coVU0p7Rg6AJFTG0ZaHQ";

        // Changed variable name here to prevent the declaration collision
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const cardsBlueprint = {
            "HDFC": { limit: 103000, theme: "from-blue-600 to-indigo-900" },
            "IDFC": { limit: 20000, theme: "from-rose-800 to-amber-900" },
            "Super Money": { limit: 9000, theme: "from-teal-600 to-cyan-900" },
            "ICICI": { limit: 330000, theme: "from-orange-600 to-amber-900" },
            "One Card": { limit: 5000, theme: "from-neutral-700 to-neutral-900" },
            "Axis Bank": { limit: 56000, theme: "from-purple-800 to-indigo-950" }
        };

        let transactions = [];

        function showToast(message) {
            const toast = document.getElementById("sync-toast");
            document.getElementById("toast-msg").innerText = message;
            toast.className = `fixed bottom-6 right-6 z-50 bg-neutral-900 border border-white/10 text-xs px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 transition-all opacity-100 translate-y-0`;
            setTimeout(() => { toast.classList.add("opacity-0", "translate-y-2", "pointer-events-none"); }, 2500);
        }

        const formatCurrency = (val) => {
            const absoluteVal = Math.abs(val);
            const formatted = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(absoluteVal);
            return val < 0 ? `-${formatted}` : formatted;
        };
        const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

        async function fetchCloudData() {
            // Using the new unique client variable
            const { data, error } = await supabaseClient.from('transactions').select('*');
            if (error) { console.error(error); return; }
            transactions = data || [];
            recalculateSystem();
        }

        function recalculateSystem() {
            let aggregatedExpenses = {};
            Object.keys(cardsBlueprint).forEach(c => aggregatedExpenses[c] = 0);
            transactions.forEach(tx => { if (aggregatedExpenses.hasOwnProperty(tx.card)) aggregatedExpenses[tx.card] += parseFloat(tx.amount); });

            let totalLimit = 0, totalExpenses = 0;
            const cardsGrid = document.getElementById("cards-grid");
            cardsGrid.innerHTML = "";

            Object.entries(cardsBlueprint).forEach(([cardName, metadata]) => {
                const spent = aggregatedExpenses[cardName];
                const available = metadata.limit - spent;
                const allocationPercentage = Math.max(0, Math.min((spent / metadata.limit) * 100, 100));
                totalLimit += metadata.limit; totalExpenses += spent;

                cardsGrid.insertAdjacentHTML("beforeend", `
                    <div class="apple-card-gradient rounded-2xl p-6 flex flex-col justify-between shadow-xl relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-br ${metadata.theme} opacity-10 group-hover:opacity-15 transition-opacity duration-300"></div>
                        <div class="relative z-10 space-y-4">
                            <div class="flex items-center justify-between"><span class="text-xs font-semibold uppercase tracking-widest text-neutral-400">${cardName}</span><i data-lucide="credit-card" class="w-4 h-4 text-neutral-500"></i></div>
                            <div><p class="text-[10px] text-neutral-400 uppercase tracking-wider mb-0.5">Available Balance</p><h4 class="text-xl font-bold ${available < 0 ? 'text-red-400' : 'text-white'}">${formatCurrency(available)}</h4></div>
                            <div class="space-y-1.5">
                                <div class="w-full bg-white/10 rounded-full h-1 overflow-hidden"><div class="h-full rounded-full transition-all duration-500 ${allocationPercentage > 85 ? 'bg-red-500' : 'bg-emerald-400'}" style="width: ${allocationPercentage}%"></div></div>
                                <div class="flex justify-between text-[11px] text-neutral-400"><span>Spent: ${formatCurrency(spent)}</span><span>Limit: ${formatCurrency(metadata.limit)}</span></div>
                            </div>
                        </div>
                    </div>`);
            });

            document.getElementById("total-limit").innerText = formatCurrency(totalLimit);
            document.getElementById("total-expenses").innerText = formatCurrency(totalExpenses);
            document.getElementById("total-available").innerText = formatCurrency(totalLimit - totalExpenses);
            renderLedger();
            lucide.createIcons();
        }

        function renderLedger(filterText = "") {
            const body = document.getElementById("ledger-body");
            const emptyState = document.getElementById("empty-state");
            body.innerHTML = "";
            const filtered = transactions.filter(tx => tx.description.toLowerCase().includes(filterText.toLowerCase()) || tx.card.toLowerCase().includes(filterText.toLowerCase()));
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) { emptyState.classList.remove("hidden"); } else {
                emptyState.classList.add("hidden");
                filtered.forEach(tx => {
                    const isCredit = parseFloat(tx.amount) < 0; const displayAmt = formatCurrency(tx.amount);
                    const row = document.createElement("tr");
                    row.className = "hover:bg-white/[0.02] transition-colors duration-150 group";
                    row.innerHTML = `
                        <td class="py-4 px-6 text-neutral-300 font-medium">${formatDate(tx.date)}</td>
                        <td class="py-4 px-6"><span class="bg-white/5 border border-white/5 px-2.5 py-1 rounded-md text-xs font-medium text-neutral-200">${tx.card}</span></td>
                        <td class="py-4 px-6 text-neutral-400 max-w-xs truncate flex items-center gap-2">${tx.description} ${isCredit ? '<span class="bg-emerald-500/10 text-emerald-400 text-[9px] px-1.5 py-0.5 rounded border border-emerald-500/20 font-medium tracking-wide uppercase">Payment/Refund</span>' : ''}</td>
                        <td class="py-4 px-6 text-right font-semibold ${isCredit ? 'text-emerald-400' : 'text-white'}">${isCredit ? displayAmt.replace('-', '+ ') : displayAmt}</td>
                        <td class="py-4 px-6 text-center"><button onclick="deleteCloudTransaction('${tx.id}')" class="text-neutral-600 hover:text-red-400 p-1.5 rounded-lg hover:bg-red-500/10 transition-all opacity-0 group-hover:opacity-100 duration-150"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>`;
                    body.appendChild(row);
                });
            }
        }

        document.getElementById("transaction-form").addEventListener("submit", async function(e) {
            e.preventDefault();
            const newTx = {
                card: document.getElementById("tx-card").value,
                amount: parseFloat(document.getElementById("tx-amount").value),
                date: document.getElementById("tx-date").value,
                description: document.getElementById("tx-desc").value
            };

            showToast("Syncing with cloud ecosystem...");
            // Using the new unique client variable
            const { error } = await supabaseClient.from('transactions').insert([newTx]);
            if (error) { alert("Cloud upload failed"); return; }
            
            document.getElementById("tx-amount").value = ""; document.getElementById("tx-desc").value = "";
            fetchCloudData();
        });

        async function deleteCloudTransaction(id) {
            showToast("Purging ledger row...");
            // Using the new unique client variable
            const { error } = await supabaseClient.from('transactions').delete().eq('id', id);
            if(error) { alert("Delete failed"); return; }
            fetchCloudData();
        }

        document.getElementById("search-ledger").addEventListener("input", (e) => { renderLedger(e.target.value); lucide.createIcons(); });
        document.getElementById("tx-date").value = new Date().toISOString().split('T')[0];
        
        fetchCloudData();
    </script>
